# 実値を入れて別名で保存するか、以下のコマンドで直接作成する(このファイル自体はテンプレート):
#   kubectl create secret generic avatarsquare-server \
#     --from-literal=LIVEKIT_API_KEY=<key> \
#     --from-literal=LIVEKIT_API_SECRET=<secret>
apiVersion: v1
kind: Secret
metadata:
  name: avatarsquare-server
stringData:
  LIVEKIT_API_KEY: CHANGEME
  LIVEKIT_API_SECRET: CHANGEME
