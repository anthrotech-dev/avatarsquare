# 開発用スタック: LiveKit (SFU)
# --devモードのLiveKitはAPIキー devkey / シークレット secret で起動する
# 外部公開する場合(開発サーバー等)は --node-ip <公開IP> を追加すること
services:
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880" # WebSocket/HTTP
      - "7881:7881" # TCP fallback
      - "7882:7882/udp" # UDP media

  # トークンAPIはバイナリを直接転送して運用するため一旦コメントアウト
  # (手元で完結させたい場合はコメントを外すか `go run ./server` を使う)
